<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Realm, ScoreQuest</title>
<meta name="description" content="Walk the realm: a side-view stroll through one biome of the quest." />
<link rel="stylesheet" href="css/style.css?v=b20260722p" />
<link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body class="page-realm">

<div class="rw-stage" id="rw-stage">
  <div class="rw-world" id="rw-world">
    <img class="rw-bg" id="rw-bg" alt="" draggable="false" />
    <div class="rw-fx" id="rw-fx" aria-hidden="true"></div>
    <canvas class="rw-trace" id="rw-trace" aria-hidden="true"></canvas>
    <canvas class="rw-bosszone" id="rw-bosszone" aria-hidden="true"></canvas>
    <canvas class="rw-capy" id="rw-capy" width="57" height="45" aria-label="Pomelo the capybara"></canvas>
  </div>

  <div class="rw-hud">
    <a class="rw-back type-utility" href="map.html">&larr; Realms</a>
    <div class="rw-title-wrap">
      <h1 class="rw-title" id="rw-title">&nbsp;</h1>
      <p class="rw-meta type-utility" id="rw-meta">&nbsp;</p>
    </div>
    <nav class="rw-arrows type-utility" aria-label="Realm preview navigation">
      <a id="rw-prev" href="#">&larr;</a>
      <span class="rw-arrows-note">preview</span>
      <a id="rw-next" href="#">&rarr;</a>
    </nav>
  </div>

  <div class="rw-weather" id="rw-weather" aria-hidden="true"></div>
  <p class="rw-hint type-utility" id="rw-hint">arrow keys to wander the path, SPACE to head for the next waypoint</p>
  <div class="rw-prompt pixel-frame" id="rw-prompt" hidden>
    <p class="rw-prompt-title type-utility" id="rw-prompt-title"></p>
    <div class="rw-prompt-row">
      <button class="btn btn-gold" id="rw-prompt-go" type="button">Start</button>
      <button class="btn btn-outline" id="rw-prompt-skip" type="button">Skip</button>
    </div>
    <p class="rw-prompt-keys type-utility">space chooses &middot; arrows switch</p>
  </div>

  <div class="rw-quiz pixel-frame" id="rw-quiz" hidden>
    <p class="rw-quiz-kicker type-utility" id="rw-quiz-kicker"></p>
    <p class="rw-quiz-q" id="rw-quiz-q"></p>
    <div class="rw-quiz-choices" id="rw-quiz-choices"></div>
    <p class="rw-quiz-feedback" id="rw-quiz-feedback"></p>
    <div class="rw-quiz-row">
      <button class="btn btn-outline" id="rw-quiz-close" type="button">Close</button>
      <button class="sq-skip-test" id="rw-quiz-skip" type="button">Skip (testing)</button>
      <button class="btn btn-gold" id="rw-quiz-continue" type="button" hidden>Continue (space)</button>
    </div>
  </div>

  <div class="rw-veil" id="rw-veil">
    <div class="paw-loader" aria-hidden="true"></div>
    <p class="type-utility" id="rw-veil-text">entering the realm&hellip;</p>
  </div>

  <div class="rw-popup pixel-frame" id="rw-popup" hidden>
    <p class="rw-popup-text" id="rw-popup-text"></p>
    <div class="rw-popup-row">
      <a class="btn btn-outline" href="map.html">Return to map</a>
      <a class="btn btn-gold" id="rw-popup-next" href="#">Onward &rarr;</a>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=b20260722p"></script>
<script src="js/auth.js?v=b20260722p"></script>
<script src="js/paws.js?v=b20260722p"></script>
<script src="js/sfx.js?v=b20260722p"></script>
<script src="js/companion.js?v=b20260722p"></script>
<script src="js/realm.js?v=b20260722p"></script>
</body>
</html>
