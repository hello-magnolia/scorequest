<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Boss fight, ScoreQuest</title>
<meta name="description" content="The guardian at the end of the realm. Answer true, strike true." />
<link rel="stylesheet" href="css/style.css?v=b20260723b" />
<link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body class="page-boss">

<div class="bf-stage" id="bf-stage">
  <div class="bf-shade"></div>
  <div class="bf-fx" id="bf-fx" aria-hidden="true"></div>

  <div class="bf-hud">
    <a class="bf-retreat type-utility" id="bf-retreat" href="realm.html">&larr; Retreat</a>
    <div class="bf-title-wrap">
      <p class="bf-kicker type-utility" id="bf-realm">Lorewood</p>
      <h1 class="bf-boss-name" id="bf-boss-name">&nbsp;</h1>
      <p class="bf-taunt" id="bf-taunt">&nbsp;</p>
    </div>
    <span class="bf-hud-spacer"></span>
  </div>

  <div class="bf-arena">
    <div class="bf-hpbar bf-hp-left" id="bf-pomelo-hp" aria-label="Pomelo's health"></div>
    <div class="bf-hpbar bf-hp-right bf-hp-flip" id="bf-boss-hp" aria-label="The guardian's health"></div>
    <div class="bf-side bf-side-boss bf-side-boss-left" id="bf-boss-side-left" aria-hidden="true">
      <div class="bf-boss-rig" id="bf-boss-rig-left">
        <img class="bf-boss-img" id="bf-boss-img-left" alt="" draggable="false" />
      </div>
    </div>
    <div class="bf-side" id="bf-pomelo-side">
      <canvas class="bf-capy" id="bf-capy" width="57" height="45" aria-label="Pomelo"></canvas>
      <img class="bf-capy-attack" id="bf-capy-attack" alt="Pomelo, rearing to throw" hidden draggable="false" />
    </div>
    <img class="bf-fireball" id="bf-fireball" alt="" hidden draggable="false" />
    <div class="bf-beam" id="bf-beam" aria-hidden="true" hidden></div>


    <img class="bf-orange" id="bf-orange" alt="" hidden draggable="false" />
    <span class="bf-yell" id="bf-yell" aria-hidden="true" hidden></span>
    <div class="bf-side bf-side-boss" id="bf-boss-side">
      <div class="bf-boss-rig" id="bf-boss-rig">
        <div class="bf-tails" id="bf-tails" aria-hidden="true"></div>
        <img class="bf-boss-img" id="bf-boss-img" alt="The realm's guardian" draggable="false" />
      </div>
    </div>
  </div>

  <div class="bf-box pixel-frame">
    <p class="bf-question" id="bf-question">&nbsp;</p>
    <div class="bf-choices" id="bf-choices"></div>
    <p class="bf-feedback" id="bf-feedback"></p>
  </div>

  <div class="bf-panel pixel-frame" id="bf-victory" hidden>
    <h2 class="bf-panel-title">The shrine opens.</h2>
    <p class="bf-panel-text">The Archivist bows and returns every twisted word. The way forward is clear.</p>
    <div class="bf-panel-row">
      <a class="btn btn-outline" id="bf-return" href="map.html">Return to realms</a>
      <a class="btn btn-gold" id="bf-onward" href="realm.html">Onward &rarr;</a>
    </div>
  </div>

  <div class="bf-panel pixel-frame" id="bf-defeat" hidden>
    <h2 class="bf-panel-title">Pomelo needs a snack break.</h2>
    <p class="bf-panel-text">No harm done. The guardian will wait, and the questions will be the same kind. Ready when u are.</p>
    <div class="bf-panel-row">
      <button class="btn btn-gold" id="bf-retry" type="button">Try again</button>
      <a class="btn btn-outline" href="realm.html?realm=lorewood">Back to the realm</a>
    </div>
  </div>
</div>

<!-- the intro reel lives at body level: nothing in the arena or the
     question box can stack above it -->
<div class="bf-intro" id="bf-intro" hidden>
  <video id="bf-intro-video" playsinline preload="auto" aria-label="Guardian intro"></video>
  <button class="bf-intro-vol" id="bf-intro-vol" type="button" aria-label="Sound on. Turn sound off" aria-pressed="true">
    <svg viewBox="0 0 12 12" shape-rendering="crispEdges" aria-hidden="true">
      <g fill="#f4e9d0">
        <rect x="1" y="4" width="2" height="4"/>
        <rect x="3" y="3" width="1" height="6"/>
        <rect x="4" y="2" width="1" height="8"/>
      </g>
      <g class="vol-wave" fill="#f4e9d0">
        <rect x="7" y="4" width="1" height="4"/>
        <rect x="9" y="2" width="1" height="8"/>
      </g>
      <g class="vol-slash" fill="#e2695a">
        <rect x="2" y="9" width="2" height="2"/><rect x="3" y="8" width="2" height="2"/>
        <rect x="4" y="7" width="2" height="2"/><rect x="5" y="6" width="2" height="2"/>
        <rect x="6" y="5" width="2" height="2"/><rect x="7" y="4" width="2" height="2"/>
        <rect x="8" y="3" width="2" height="2"/><rect x="9" y="2" width="2" height="2"/>
      </g>
    </svg>
  </button>
  <button class="btn btn-outline bf-intro-skip" id="bf-intro-skip" type="button">Skip intro (space)</button>
</div>
<!-- the dark that splits down the middle and opens onto the fight -->
<div class="bf-curtain" id="bf-curtain" hidden aria-hidden="true">
  <div class="bf-curtain-half bf-curtain-l"></div>
  <div class="bf-curtain-half bf-curtain-r"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/config.js?v=b20260723b"></script>
<script src="js/auth.js?v=b20260723b"></script>
<script src="js/sfx.js?v=b20260723b"></script>
<script src="js/companion.js?v=b20260723b"></script>
<script src="js/boss.js?v=b20260723b"></script>
</body>
</html>
