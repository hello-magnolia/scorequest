<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Your Profile, ScoreQuest</title>
<meta name="description" content="Your ScoreQuest journey: realms explored, waypoints cleared, guardians felled." />
<script>
try { if (window.localStorage.getItem('sb-moasnmwcikwybriwaoip-auth-token')) document.documentElement.classList.add('is-authed'); } catch (e) {}
</script>
<link rel="stylesheet" href="css/style.css?v=b20260723b" />
<link rel="icon" type="image/png" href="assets/logo.png" />
</head>
<body class="page-map" data-account-page="profile">

<header class="nav is-scrolled" id="nav">
  <div class="nav-inner">
    <a class="brand" href="index.html" aria-label="ScoreQuest home">
      <img class="brand-coin" src="assets/logo.png" alt="" aria-hidden="true" />
      <span class="brand-name">ScoreQuest</span>
    </a>
    <nav class="nav-links" aria-label="Primary">
      <a href="map.html">Map</a>
      <a href="parents.html">Parents</a>
    </nav>
    <div class="nav-cta"></div>
  </div>
</header>

<main class="pf">
  <div class="pf-banner"><img src="assets/worldmap.webp" alt="" aria-hidden="true" /></div>
  <div class="pf-head">
    <div class="pf-avatar" id="pf-avatar">&nbsp;</div>
    <div class="pf-id">
      <h1 class="pf-name" id="pf-name">&nbsp;</h1>
      <p class="pf-handle type-utility" id="pf-email"></p>
      <p class="pf-joined" id="pf-joined"></p>
    </div>
    <a class="btn btn-outline pf-edit" href="settings.html">Edit profile</a>
  </div>

  <div class="pf-grid">
    <section class="pf-main">
      <h2 class="pf-h2">Journey</h2>
      <div class="pf-journey" id="pf-realms"></div>
    </section>

    <aside class="pf-rail">
      <div class="pf-card pixel-frame">
        <div class="pf-hero">
          <img class="pf-hero-sprite" src="assets/pomelo/attack1.png" alt="" aria-hidden="true" />
          <div>
            <div class="pf-hero-name" id="hc-name">&nbsp;</div>
            <div class="pf-hero-level type-utility" id="hc-level"></div>
          </div>
        </div>
        <div class="pf-stats">
          <div class="pf-stat">
            <svg class="pf-stat-ico" viewBox="0 0 12 12" aria-hidden="true"><rect x="5" y="0" width="2" height="3" fill="#f2b63c"/><rect x="5" y="9" width="2" height="3" fill="#f2b63c"/><rect x="0" y="5" width="3" height="2" fill="#f2b63c"/><rect x="9" y="5" width="3" height="2" fill="#f2b63c"/><rect x="4" y="4" width="4" height="4" fill="#ffe9a8"/><rect x="5" y="5" width="2" height="2" fill="#fff"/></svg>
            <span class="pf-stat-txt"><span class="pf-stat-n" id="hc-xp">0</span><span class="pf-stat-l">Total XP</span></span>
          </div>
          <div class="pf-stat">
            <svg class="pf-stat-ico" viewBox="0 0 12 12" aria-hidden="true"><rect x="5" y="0" width="2" height="2" fill="#ff9a3c"/><rect x="4" y="2" width="4" height="2" fill="#ff9a3c"/><rect x="3" y="4" width="6" height="3" fill="#ff7a2e"/><rect x="2" y="7" width="8" height="3" fill="#ff9a3c"/><rect x="4" y="8" width="4" height="3" fill="#ffd23c"/><rect x="5" y="9" width="2" height="2" fill="#ffe9a8"/></svg>
            <span class="pf-stat-txt"><span class="pf-stat-n" id="hc-streak">0</span><span class="pf-stat-l">Day streak</span></span>
          </div>
        </div>
      </div>
      <div class="pf-card pixel-frame">
        <h3 class="pf-h3">Achievements</h3>
        <div id="pf-ach"></div>
      </div>
    </aside>
  </div>
</main>

<script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script defer src="js/config.js?v=b20260723b"></script>
<script defer src="js/auth.js?v=b20260723b"></script>
<script defer src="js/usernav.js?v=b20260723b"></script>
<script defer src="js/sfx.js?v=b20260723b"></script>
<script defer src="js/account-pages.js?v=b20260723b"></script>
</body>
</html>
